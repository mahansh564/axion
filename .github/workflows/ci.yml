name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 3 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install JS
        run: pnpm install --frozen-lockfile

      - name: Lint & test & build
        env:
          AXION_TRANSCRIBE_STUB: "1"
        run: pnpm turbo run lint typecheck test build --concurrency=1

      - name: Golden dataset eval
        env:
          AXION_TRANSCRIBE_STUB: "1"
          DATABASE_URL: ${{ github.workspace }}/apps/api/data/eval.db
          EVAL_PASS_THRESHOLD: "0.90"
        run: pnpm --filter @axion/api eval:run

      - name: Upload eval reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports
          path: apps/api/data/eval/*.json
