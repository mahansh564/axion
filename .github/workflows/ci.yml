name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install JS
        run: pnpm install --frozen-lockfile

      - name: Lint & test & build
        env:
          AXION_TRANSCRIBE_STUB: "1"
        run: pnpm turbo run lint typecheck test build --concurrency=1
